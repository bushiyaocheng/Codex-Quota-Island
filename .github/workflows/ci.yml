name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: swift test
      - name: Build app bundle
        run: |
          chmod +x scripts/package_app.sh
          ./scripts/package_app.sh
